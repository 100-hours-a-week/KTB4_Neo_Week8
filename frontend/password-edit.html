<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 수정 - 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/mypage.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div class="header-left"></div>
      <h1 class="service-title">아무 말 대잔치</h1>
      <div class="header-right">
        <div class="profile-menu">
          <a class="profile-link" href="./mypage.html" aria-label="프로필 메뉴 열기" aria-expanded="false">
            <img id="header-profile-image" src="./assets/images/default-profile.svg" alt="로그인 사용자 프로필" />
          </a>
          <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴">
            <a href="./mypage.html">회원정보수정</a>
            <a href="./password-edit.html">비밀번호수정</a>
            <button id="logout-button" type="button">로그아웃</button>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main class="page-main password-main">
    <form id="password-edit-form" class="password-form" novalidate>
      <h2 class="page-title">비밀번호 수정</h2>
      <div class="form-field">
        <label for="current-password">현재 비밀번호</label>
        <input id="current-password" name="curPassword" type="password" placeholder="현재 비밀번호를 입력하세요." />
        <p id="current-password-helper" class="helper-text">* helper text</p>
      </div>
      <div class="form-field">
        <label for="password">새 비밀번호</label>
        <input id="password" name="password" type="password" placeholder="새 비밀번호를 입력하세요." />
        <p id="password-helper" class="helper-text">* helper text</p>
      </div>
      <div class="form-field">
        <label for="password-check">새 비밀번호 확인</label>
        <input id="password-check" name="passwordCheck" type="password" placeholder="새 비밀번호를 한번 더 입력하세요." />
        <p id="password-check-helper" class="helper-text">* helper text</p>
      </div>
      <button id="edit-button" class="primary-button full-width-button" type="submit">수정하기</button>
    </form>
  </main>

  <p id="toast" class="toast-message" hidden>수정 완료</p>

  <script src="./js/api.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/password-edit.js"></script>
</body>
</html>
