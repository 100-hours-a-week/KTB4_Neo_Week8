<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>게시글 목록 - 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/posts.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div class="header-left"></div>
      <h1 class="service-title">아무 말 대잔치</h1>
      <div class="header-right">
        <div class="profile-menu">
          <a class="profile-link" href="./mypage.html" aria-label="마이페이지로 이동" aria-expanded="false">
            <img id="header-profile-image" src="./assets/images/default-profile.svg" alt="로그인 사용자 프로필" />
          </a>
          <nav id="profile-dropdown" class="profile-dropdown" aria-label="프로필 메뉴">
            <a href="./mypage.html">회원정보수정</a>
            <a href="./password-edit.html">비밀번호수정</a>
            <button id="logout-button" type="button">로그아웃</button>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main class="page-main posts-main">
    <section class="posts-hero">
      <p class="posts-hero-text">안녕하세요,<br />아무 말 대잔치 <strong>게시판</strong> 입니다.</p>
      <a class="primary-button pill-button write-button" href="./post-create.html">게시글 작성</a>
    </section>

    <section id="posts" class="posts" aria-label="게시글 목록">
      <p class="helper-text">* 게시글을 불러오는 중입니다.</p>
    </section>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/posts.js"></script>
</body>
</html>
