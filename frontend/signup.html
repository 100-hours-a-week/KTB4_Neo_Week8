<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 아무 말 대잔치</title>
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/auth.css" />
</head>
<body>
  <header class="page-header">
    <div class="header-inner">
      <div class="header-left">
        <button id="back-button" class="back-button" type="button" aria-label="뒤로 가기" data-back-fallback="./login.html"></button>
      </div>
      <h1 class="service-title">아무 말 대잔치</h1>
      <div class="header-right"></div>
    </div>
  </header>

  <main class="page-main signup-main">
    <form id="signup-form" class="auth-form" novalidate>
      <h2 class="auth-title signup-title">회원가입</h2>
      <div class="profile-upload-block">
        <span class="profile-upload-label">프로필 사진</span>
        <p id="profile-helper" class="helper-text" aria-live="polite">* helper text</p>
        <label id="profile-preview" class="profile-upload-circle" for="profile-image" aria-label="프로필 사진 업로드">+</label>
        <input id="profile-image" class="visually-hidden" name="profileImage" type="file" accept="image/*" />
      </div>
      <div class="form-field">
        <label for="email">이메일*</label>
        <input id="email" name="email" type="email" placeholder="이메일을 입력하세요." />
        <p id="email-helper" class="helper-text" aria-live="polite">* helper text</p>
      </div>
      <div class="form-field">
        <label for="password">비밀번호*</label>
        <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요." />
        <p id="password-helper" class="helper-text" aria-live="polite">* helper text</p>
      </div>
      <div class="form-field">
        <label for="password-check">비밀번호 확인*</label>
        <input id="password-check" name="passwordCheck" type="password" placeholder="비밀번호를 한번 더 입력하세요." />
        <p id="password-check-helper" class="helper-text" aria-live="polite">* helper text</p>
      </div>
      <div class="form-field">
        <label for="nickname">닉네임*</label>
        <input id="nickname" name="nickname" type="text" placeholder="닉네임을 입력하세요." />
        <p id="nickname-helper" class="helper-text" aria-live="polite">* helper text</p>
      </div>
      <button id="signup-button" class="primary-button full-width-button" type="submit" disabled>회원가입</button>
      <a class="auth-link" href="./login.html">로그인하러 가기</a>
    </form>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/signup.js"></script>
</body>
</html>
